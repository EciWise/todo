services:
  postgres:
    image: postgres:16-alpine
    container_name: eciwise-todo-postgres
    environment:
      POSTGRES_DB: eciwise_todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eciwise_todo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
